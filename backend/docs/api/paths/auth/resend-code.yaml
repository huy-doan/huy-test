post:
  tags:
    - auth
  summary: Resend MFA code
  description: Resend MFA verification code
  operationId: resendCode
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          required:
            - email
          properties:
            email:
              type: string
              format: email
              example: "user@example.com"
  responses:
    '200':
      description: Code resent successfully
      content:
        application/json:
          schema:
            type: object
            properties:
              success:
                type: boolean
                example: true
              message:
                type: string
                example: "Verification code has been sent"
              data:
                type: object
                properties:
                  user:
                    type: object
                    properties:
                      email:
                        type: string
                        example: "user@example.com"
                      mfa_type:
                        type: string
                        example: "Email"
                  expires_in:
                    type: integer
                    example: 30
                  mfa_type_id:
                    type: integer
                    example: 1
    '400':
      description: Bad Request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    '404':
      description: User not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'