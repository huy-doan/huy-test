post:
  tags:
    - auth
  summary: Verify MFA token
  description: Verify MFA token for authentication
  operationId: verifyMFA
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          required:
            - email
            - token
          properties:
            email:
              type: string
              format: email
              example: "user@example.com"
            token:
              type: string
              example: "123456"
  responses:
    '200':
      description: Verification successful
      content:
        application/json:
          schema:
            type: object
            properties:
              success:
                type: boolean
                example: true
              message:
                type: string
                example: "Login successful"
              data:
                type: object
                properties:
                  token:
                    type: string
                    example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
                  user:
                    $ref: '#/components/schemas/User'
    '400':
      description: Bad Request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    '401':
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'