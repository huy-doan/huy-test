openapi: 3.0.3
info:
  title: Makeshop Payment API
  description: API for Makeshop payment system
  version: 1.0.0
  contact:
    name: API Support
    email: support@example.com

servers:
  - url: /api/v1
    description: Default server

# Components dùng chung cho toàn bộ API
components:
  schemas:
    # Common responses
    Error:
      type: object
      properties:
        success:
          type: boolean
          example: false
        message:
          type: string
          example: "Validation error"
        error:
          type: object
          properties:
            code:
              type: string
              example: "VALIDATION_ERROR"
            type:
              type: string
              example: "VALIDATION"
            details:
              type: object
              additionalProperties: true

    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: "Operation completed successfully"
        data:
          type: object
          additionalProperties: true

    # User và Role
    User:
      type: object
      properties:
        id:
          type: integer
          example: 1
        email:
          type: string
          example: "user@example.com"
        full_name:
          type: string
          example: "John Doe"
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        enabled_mfa:
          type: boolean
          example: true
        role:
          $ref: '#/components/schemas/Role'

    Role:
      type: object
      properties:
        id:
          type: integer
          example: 1
        code:
          type: string
          example: "ADMIN"
        name:
          type: string
          example: "Administrator"

  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

# Tất cả API paths
paths:
  # Thêm path cho auth API
  /auth/login:
    $ref: './paths/auth/login.yaml'
  /auth/verify:
    $ref: './paths/auth/verify.yaml'
  /auth/resend-code:
    $ref: './paths/auth/resend-code.yaml'
  /auth/logout:
    $ref: './paths/auth/logout.yaml'
  /auth/me:
    $ref: './paths/auth/me.yaml'